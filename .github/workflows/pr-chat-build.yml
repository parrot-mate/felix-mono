name: Build PR Chat

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Prepare HEAD_REF_SLUG
        run: |
          HEAD_REF_SLUG=$(echo "${{ github.head_ref }}" | sed 's/\//-/g')
          echo "HEAD_REF_SLUG=$HEAD_REF_SLUG" >> $GITHUB_ENV

      - name: Build
        run: |
          ./scripts/build-pr "${{ env.HEAD_REF_SLUG }}"
