<!doctype html>
<html lang="en">

<head>
  <meta name="aidict-ignore" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no " />
  <link rel="icon" href="/reader/icon2.ico" type="image/x-icon" />
  <title>Parrot Mate - Login</title>
  <style>
    body {
      font-size: 16px;
    }

    @font-face {
      font-family: "Roboto";
      font-style: normal;
      font-weight: 400;
      src:
        url("/reader/fonts/Roboto-Regular.woff2") format("woff2"),
        url("/reader/fonts/Roboto-Regular.woff") format("woff");
    }

    body,
    #root {
      box-sizing: border-box;
      margin: 0;
      width: 100%;
      font-family: "Roboto", sans-serif;
      overflow-x: hidden;
    }

    #root {
      padding: 0px 0px;
    }
  </style>

  <script>
    window.AliyunCaptchaConfig = {
      // 必填，验证码示例所属地区，支持中国内地（cn）、新加坡（sgp）
      region: "cn",
      // 必填，身份标。开通阿里云验证码2.0后，您可以在控制台概览页面的实例基本信息卡片区域，获取身份标
      prefix: "1o9oka",
    };
  </script>
  <!--2.集成主JS-->
  <script type="text/javascript" src="https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js">
  </script>

</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/app.tsx"></script>
</body>

</html>
