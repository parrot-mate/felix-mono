<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/chat/manifest.json" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no "
    />
    <link rel="icon" href="https://parrot-static.pmate.chat/parrot-logo.png" type="image/png" />
    <script src="/chat/pmate-jssdk0.0.1.js"></script>
    <!-- <script src="https://parrot-static.pmate.chat/scripts/eruda.js"></script>
    <script>
      if(window.location.href.match(/debug/)) {
        eruda.init();
      }
    </script> -->

    <title>鹦鹉同学</title>
    <style>
      /* html {
        font-size: 18.75px;

      } */
      @font-face {
        font-family: "Roboto";
        font-style: normal;
        font-weight: 400; /* Light weight */
        src:
          url("https://parrot-static.pmate.chat/fonts/Roboto-Regular.woff2") format("woff2"),
          url("https://parrot-static.pmate.chat/fonts/Roboto-Regular.woff") format("woff");
      }

      * {
        font-family: "roboto", sans-serif;
        user-select: none;
        /* Standard syntax */
        -webkit-user-select: none;
        /* Safari and Chrome */
        -moz-user-select: none;
        /* Firefox */
        -ms-user-select: none;
        /* Internet Explorer and Edge */
      }

      body,
      #root {
        box-sizing: border-box;
        margin: 0;
        width: 100%;
        font-family: "Roboto", sans-serif;
        overflow-x: hidden;
      }

      #root {
        padding: 0px 0px;
        /* background-color: #f6f6e8; */
      }

      /* Splash Screen Styles */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        opacity: 1;
        transition: opacity 0.6s ease-out;
      }

      .splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-white-panel {
        position: absolute;
        top: 308px;
        right: 0;
        width: 100%;
        height: 15.25rem;
        background-color: white;
        z-index: 10;
        transform: translateX(80%);
        animation: slideInShake 2s ease-in-out forwards;
      }

      @keyframes slideInShake {
        0% { transform: translateX(80%); }
        80% { transform: translateX(0%); }
        87% { transform: translateX(-10px); }
        92% { transform: translateX(10px); }
        96% { transform: translateX(-5px); }
        99% { transform: translateX(5px); }
        100% { transform: translateX(0px); }
      }

      .splash-content {
        position: relative;
        z-index: 20;
        text-align: center;
      }

      .splash-logo {
        width: 6rem;
        height: 6rem;
        margin: 0 auto 1rem;
        display: block;
      }

      .splash-brand-container {
        margin-top: 0.5rem;
        height: 3.5rem;
      }

      .splash-brand {
        font-size: 1.25rem;
        font-weight: 600;
        color: #8b5cf6;
        margin: 0;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.6s ease-out;
      }

      .splash-brand.show {
        opacity: 1;
        transform: translateY(0);
      }

      .splash-slogan {
        height: 1.5rem;
        margin-top: 0.5rem;
      }

      .splash-slogan-text {
        font-size: 0.875rem;
        color: #6b7280;
        margin: 0;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.6s ease-out;
      }

      .splash-slogan-text.show {
        opacity: 1;
        transform: translateY(0);
      }
      
    </style>
  </head>

  <body class="bg-gray-50">
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
      <div class="splash-white-panel"></div>
      <div class="splash-content">
        <img src="https://parrot-static.pmate.chat/parrot-logo.png" alt="logo" class="splash-logo" />
        <div class="splash-brand-container">
          <h1 class="splash-brand" id="splash-brand">ParrotMate<sup>®</sup></h1>
          <div class="splash-slogan">
            <p class="splash-slogan-text" id="splash-slogan">Speak Different</p>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/chat.tsx"></script>

    <script>
      // Splash Screen Logic
      (function() {
        const splashScreen = document.getElementById('splash-screen');
        const splashBrand = document.getElementById('splash-brand');
        const splashSlogan = document.getElementById('splash-slogan');
        
        // Configuration
        const DURATION = 3000; // 3 seconds total
        const SLOGAN_DELAY = 2000; // Show slogan after 2 seconds
        const FADE_OUT_DELAY = 600; // Fade out duration
        
        // Show slogan after delay
        setTimeout(() => {
          splashBrand.classList.add('show');
          splashSlogan.classList.add('show');
        }, SLOGAN_DELAY);
        
        // Hide splash screen after duration
        setTimeout(() => {
          splashScreen.classList.add('hidden');
          
          // Remove from DOM after fade out
          setTimeout(() => {
            splashScreen.remove();
          }, FADE_OUT_DELAY);
        }, DURATION);
      })();
    </script>
  </body>
</html>
