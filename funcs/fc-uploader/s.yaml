edition: 3.0.0
name: fc-uploader
access: "default"

vars: # 全局变量
  region: "cn-hangzhou"

resources:
  hello_world:
    component: fc3
    props:
      region: ${vars.region}
      functionName: "fc-uploader"
      description: "uploader service @v1.1"
      runtime: "nodejs16"
      code: ./dist
      handler: index.handler
      memorySize: 256
      timeout: 60
      environmentVariables:
        OSS_REGION: ${env('OSS_REGION')}
        OSS_ACCESS_KEY_ID: ${env('OSS_ACCESS_KEY_ID')}
        OSS_ACCESS_KEY_SECRET: ${env('OSS_ACCESS_KEY_SECRET')}
        OSS_BUCKET: ${env('OSS_BUCKET')}
      logConfig:
        enableRequestMetrics: true
        enableInstanceMetrics: true
        logBeginRule: DefaultRegex
        logstore: default-logs
        project: serverless-cn-hangzhou-56863940-e7de-53b5-9529-9aaa6cd33a04

      triggers:
        - triggerName: httpTrigger # 触发器名称
          triggerType: http # 触发器类型
          description: "xxxx"
          qualifier: LATEST # 触发服务的版本
          triggerConfig:
            authType: anonymous # 鉴权类型，可选值：anonymous、function
            disableURLInternet: false # 是否禁用公网访问 URL
            methods: # HTTP 触发器支持的访问方法，可选值：GET、POST、PUT、DELETE、HEAD
              - GET
              - POST
              - OPTIONS
